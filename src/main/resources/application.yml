server:
  port: ${PORT}
  address: 0.0.0.0

spring:
  application:
    name: attendance-system

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: thisIsASuperSecureKeyForJwtTokenGeneration123456789123456
  expiration: 86400000

file:
  upload-dir: uploads/profile-images