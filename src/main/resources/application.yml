server:
  port: 8080

spring:
  application:
    name: attendance-system

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/StudentAttendanceApp}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:mubarak}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

jwt:
  secret: thisIsASuperSecureKeyForJwtTokenGeneration123456789123456
  expiration: 86400000

file:
  upload-dir: uploads/profile-images